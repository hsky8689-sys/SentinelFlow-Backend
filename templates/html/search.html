{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search page</title>
    <link rel="stylesheet" href="{% static 'css/search-page.css' %}">
    <script src="{% static 'js/search-page.js' %}" type="module"></script>
</head>
<body>
    <div class="header-bar">
        <input type="text" id="searchbar" placeholder="Type something to search" class="search-bar">
        <button class="search-button">Search</button>
    </div>
    <div class="content">
        <div class="suggested-friends">
            Maybe you know them
        </div>
        <div class="feed" id="search-results">
            
        </div>
        <div class="suggested-projects">
            Projects you might find interesting
        </div>
    </div>
</body>
</html>
